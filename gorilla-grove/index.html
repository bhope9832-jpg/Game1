<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Gorilla Grove</title>
</head>
<body>
<style>
  html,body{height:100%;}
  body{
    margin:0; background:#07130d; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    touch-action:none; -webkit-user-select:none; user-select:none;
    font-family:ui-monospace,Menlo,Consolas,monospace;
  }
  #wrap{position:relative; line-height:0;}
  canvas{
    image-rendering:pixelated; image-rendering:crisp-edges;
    display:block; background:#000;
  }
  .pad{position:fixed; bottom:14px; display:none; gap:10px; z-index:5;}
  .pad.left{left:14px;} .pad.right{right:14px;}
  .pbtn{
    width:58px;height:58px;border-radius:14px;
    background:rgba(230,220,190,.14); border:2px solid rgba(230,220,190,.35);
    color:#e8d9a0; font-size:22px; font-weight:700;
    display:flex;align-items:center;justify-content:center; line-height:1;
  }
  .pbtn:active{background:rgba(255,207,63,.35);}
  body.touch .pad{display:flex;}
</style>
<div id="wrap"><canvas id="cv" width="384" height="216"></canvas></div>
<div class="pad left">
  <div class="pbtn" data-k="left">&#9664;</div>
  <div class="pbtn" data-k="right">&#9654;</div>
</div>
<div class="pad right">
  <div class="pbtn" data-k="roll">R</div>
  <div class="pbtn" data-k="jump">J</div>
</div>
<script>
'use strict';
/* ============================================================
   GORILLA GROVE — an original 16-bit style jungle platformer.
   All art, level design and music are generated in this file.
   ============================================================ */
const W=384, H=216, TILE=16;
const cv=document.getElementById('cv'), g=cv.getContext('2d');
g.imageSmoothingEnabled=false;

/* ---------- display scaling (integer where possible) ---------- */
function fit(){
  const s=Math.max(1, Math.floor(Math.min(innerWidth/W, innerHeight/H)));
  const s2=Math.min(innerWidth/W, innerHeight/H);
  const use=(s2<1)?s2:s;
  cv.style.width=(W*use)+'px'; cv.style.height=(H*use)+'px';
}
addEventListener('resize',fit); fit();

/* ---------------- input ---------------- */
const keys={left:false,right:false,up:false,down:false,jump:false,roll:false,start:false};
const jp={jump:false,roll:false,start:false};     // just-pressed
const MAP={ArrowLeft:'left',KeyA:'left',ArrowRight:'right',KeyD:'right',
  ArrowUp:'up',KeyW:'up',ArrowDown:'down',KeyS:'down',
  Space:'jump',KeyZ:'jump',KeyK:'jump',KeyX:'roll',KeyJ:'roll',Enter:'start'};
addEventListener('keydown',e=>{
  const k=MAP[e.code]; if(!k) return; e.preventDefault();
  if(!keys[k] && (k==='jump'||k==='roll'||k==='start')) jp[k]=true;
  keys[k]=true; audio.unlock();
});
addEventListener('keyup',e=>{const k=MAP[e.code]; if(k) keys[k]=false;});
addEventListener('keydown',e=>{ if(e.code==='KeyM') audio.muted=!audio.muted; });
/* touch pads */
if('ontouchstart' in window) document.body.classList.add('touch');
document.querySelectorAll('.pbtn').forEach(b=>{
  const k=b.dataset.k;
  const dn=e=>{e.preventDefault(); if(!keys[k]&&(k==='jump'||k==='roll'))jp[k]=true; keys[k]=true; jp.start=true; audio.unlock();};
  const up=e=>{e.preventDefault(); keys[k]=false;};
  b.addEventListener('pointerdown',dn); b.addEventListener('pointerup',up);
  b.addEventListener('pointercancel',up); b.addEventListener('pointerleave',up);
});
cv.addEventListener('pointerdown',()=>{jp.start=true; audio.unlock();});

/* ---------------- audio: tiny original chiptune + sfx ---------------- */
const audio={
  ctx:null, muted:false, t0:0, step:0,
  unlock(){ if(!this.ctx){ this.ctx=new (window.AudioContext||window.webkitAudioContext)();
      this.t0=this.ctx.currentTime+0.1; setInterval(()=>this.tick(),40);}
    if(this.ctx.state==='suspended') this.ctx.resume(); },
  osc(type,f0,f1,t,dur,vol){
    if(!this.ctx||this.muted) return;
    const c=this.ctx,o=c.createOscillator(),v=c.createGain();
    o.type=type; o.frequency.setValueAtTime(f0,t);
    if(f1!==f0) o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
    v.gain.setValueAtTime(vol,t); v.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(v).connect(c.destination); o.start(t); o.stop(t+dur+0.02);
  },
  sfx(name){
    if(!this.ctx) return; const t=this.ctx.currentTime;
    if(name==='jump')   this.osc('square',300,620,t,.14,.12);
    if(name==='fruit')  {this.osc('square',900,1400,t,.07,.09); this.osc('square',1350,1800,t+.06,.08,.08);}
    if(name==='stomp')  this.osc('triangle',260,60,t,.15,.2);
    if(name==='roll')   this.osc('sawtooth',180,90,t,.18,.09);
    if(name==='hurt')   this.osc('sawtooth',220,50,t,.3,.16);
    if(name==='launch') this.osc('square',150,900,t,.3,.14);
    if(name==='letter') {[523,659,784,1047].forEach((f,i)=>this.osc('square',f,f,t+i*.07,.09,.1));}
    if(name==='check')  {[392,523,659].forEach((f,i)=>this.osc('triangle',f,f,t+i*.08,.12,.14));}
    if(name==='win')    {[523,659,784,1047,784,1047,1319].forEach((f,i)=>this.osc('square',f,f,t+i*.11,.14,.12));}
    if(name==='die')    {[400,300,200,120].forEach((f,i)=>this.osc('sawtooth',f,f*.8,t+i*.12,.14,.14));}
  },
  /* original loop: C minor pentatonic groove, 2 voices + hat */
  lead:[392,0,466,392, 311,0,392,466, 523,0,466,392, 311,262,0,0,
        392,0,466,523, 622,0,523,466, 392,0,311,262, 233,0,262,0],
  bass:[131,131,0,131, 117,117,0,117, 104,104,0,104, 117,117,131,0],
  tick(){
    if(this.muted||!this.ctx||state.mode!=='play') return;
    const spb=60/112/2; // 16ths at 112bpm
    while(this.t0<this.ctx.currentTime+0.12){
      const i=this.step;
      const L=this.lead[i%32], B=this.bass[i%16];
      if(L) this.osc('square',L,L,this.t0,spb*0.9,.045);
      if(B) this.osc('triangle',B,B,this.t0,spb*0.95,.10);
      if(i%2===0) this.osc('square',6000,5000,this.t0,.02,.012);
      this.t0+=spb; this.step++;
    }
  }
};

/* ---------------- pixel helpers ---------------- */
function P(x,y,w,h,c){ g.fillStyle=c; g.fillRect(Math.round(x),Math.round(y),w,h); }
function hash(n){ n=(n<<13)^n; return (1-((n*(n*n*15731+789221)+1376312589)&0x7fffffff)/1073741824)*0.5+0.5; }

/* ---------------- level data (data-driven, not ASCII) ---------------- */
/* ground: [startCol, endCol, topRow]  — fills solid down to row 14 */
const ground=[
  [0,17,12],
  [22,30,12],[31,38,11],[39,46,10],
  [53,64,12],
  [70,76,11],[80,86,12],
  [92,118,12],[100,104,10],
  [124,131,12],[136,142,11],
  [149,151,9],[155,157,8],[161,163,9],
  [168,186,12],[173,177,9],
  [193,199,11],[204,222,12],[210,215,10],
  [223,244,11]
];
/* wooden platforms: [col,row,width] */
const plats=[
  [18,10,3],[26,9,4],[48,9,3],[58,8,4],
  [66,9,3],[77,8,2],[88,9,3],
  [96,8,3],[108,8,4],[113,6,3],
  [120,9,3],[132,8,3],[144,7,3],[152,5,2],[158,4,2],
  [188,9,3],[200,8,3],
  [206,7,3],[217,7,3]
];
/* barrel cannons: [col,row, baseAngleDeg, swingDeg] (angle measured up from +x) */
const cannonDefs=[
  [49,6,60,35],[52,3,20,25],           // over first big pit — chain
  [147,5,55,40],                        // boost onto pillar run
  [165,4,15,20]                         // fling across to the grove
];
/* enemies:  t: tusker patrol [colA,colB,row]   h: hornet [col,row,ampTiles] */
const tuskers=[[24,29,12],[33,38,11],[55,63,12],[93,99,12],[110,117,12],[170,180,12],[205,214,12],[226,236,11]];
const hornets=[[68,8,1.2],[84,7,1.5],[122,7,1.4],[140,5,1.3],[159,6,1.8],[191,7,1.4],[201,5,1.2]];
/* fruit lines: [col,row,count,dcol,drow] */
const fruitDefs=[
  [3,10,4,1,0],[12,10,3,1,0],
  [18,8,3,1,0],[26,7,4,1,0],[33,9,4,1,0],[41,8,4,1,0],
  [48,7,3,0.9,-0.5],[51,4,3,1,0],
  [58,6,4,1,0],[66,7,3,1,0],[72,9,3,1,0],[81,10,3,1,0],[88,7,3,1,0],
  [96,6,3,1,0],[101,8,3,1,0],[108,6,4,1,0],[113,4,3,1,0],
  [125,10,4,1,0],[132,6,3,1,0],[137,9,3,1,0],[144,5,3,1,0],
  [149,7,3,1,0],[155,6,2,1,0],[161,7,3,1,0],
  [170,10,4,1,0],[174,7,4,1,0],[181,10,3,1,0],
  [188,7,3,1,0],[194,9,3,1,0],[200,6,3,1,0],[207,5,3,1,0],[211,8,4,1,0],[217,5,3,1,0],
  [226,9,4,1,0],[232,9,4,1,0]
];
/* five golden letters spell the grove */
const letterDefs=[[19,6,'G'],[59,5,'R'],[114,4,'O'],[153,3,'V'],[218,4,'E']];
const checkpointCol=125, goalCol=240;
const LEVEL_COLS=246, LEVEL_W=LEVEL_COLS*TILE;

/* build collision grid */
const grid=[]; for(let r=0;r<15;r++){grid.push(new Uint8Array(LEVEL_COLS));}
ground.forEach(([a,b,t])=>{for(let c=a;c<=b;c++)for(let r=t;r<15;r++)grid[r][c]=1;});
plats.forEach(([c,r,w])=>{for(let i=0;i<w;i++)grid[r][c+i]=2;}); // 2 = one-way plank
function solidAt(px,py){ const c=Math.floor(px/TILE), r=Math.floor(py/TILE);
  if(c<0||c>=LEVEL_COLS||r<0||r>=15) return 0; return grid[r][c]; }

/* ---------------- game state ---------------- */
const state={mode:'title', time:0, shake:0, fade:0, msg:'', msgT:0};
let cam=0;
const player={x:40,y:150,vx:0,vy:0,w:18,h:20,face:1,onGround:false,phase:0,
  rolling:0,inCannon:-1,launched:false,inv:0,hearts:3,lives:4,fruit:0,
  letters:[], checkpoint:{x:40,y:150}, deadT:0, squash:0};
let cannons=[], enemies=[], fruits=[], letters=[], particles=[], winT=0;

function resetLevel(hard){
  cannons=cannonDefs.map(([c,r,a,s])=>({x:c*TILE+8,y:r*TILE+8,a0:a,swing:s,ang:a,t:Math.random()*6}));
  enemies=[];
  tuskers.forEach(([a,b,r])=>enemies.push({kind:'tusker',x:a*TILE+8,y:r*TILE-7,a:a*TILE+4,b:b*TILE+12,dir:1,w:18,h:13,dead:0,ph:Math.random()*6}));
  hornets.forEach(([c,r,amp])=>enemies.push({kind:'hornet',x:c*TILE+8,y0:r*TILE+8,y:r*TILE+8,amp:amp*TILE,w:14,h:12,dead:0,ph:Math.random()*6}));
  fruits=[]; fruitDefs.forEach(([c,r,n,dc,dr])=>{for(let i=0;i<n;i++)
    fruits.push({x:(c+i*dc)*TILE+8,y:(r+i*dr)*TILE+8,got:false,ph:Math.random()*6});});
  letters=letterDefs.map(([c,r,ch])=>({x:c*TILE+8,y:r*TILE+8,ch,got:player.letters.includes(ch)}));
  particles=[];
  if(hard){player.hearts=3;player.lives=4;player.fruit=0;player.letters=[];
    player.checkpoint={x:40,y:150};
    letters.forEach(l=>l.got=false);}
  respawn();
}
function respawn(){
  player.x=player.checkpoint.x; player.y=player.checkpoint.y;
  player.vx=0; player.vy=0; player.rolling=0; player.inCannon=-1;
  player.launched=false; player.inv=90; player.hearts=3; player.deadT=0;
  cam=Math.max(0,player.x-100);
}

/* ---------------- update ---------------- */
function hurt(){
  if(player.inv>0||player.rolling>0) return;
  player.hearts--; audio.sfx('hurt'); state.shake=8; player.inv=80;
  player.vy=-3.4; player.vx=-player.face*2;
  if(player.hearts<=0) die();
}
function die(){
  if(player.deadT>0) return;
  player.deadT=1; player.vy=-5; audio.sfx('die'); state.shake=10;
}
function burst(x,y,c,n){ for(let i=0;i<n;i++) particles.push({x,y,
  vx:(Math.random()-0.5)*3, vy:-Math.random()*3-1, t:30+Math.random()*20, c}); }

function update(){
  state.time++;
  if(state.mode==='title'||state.mode==='over'||state.mode==='win'){
    if(jp.start||jp.jump){ if(state.mode==='win'||state.mode==='over'){resetLevel(true);} else resetLevel(true);
      state.mode='play'; audio.step=0; if(audio.ctx) audio.t0=audio.ctx.currentTime+0.05; }
    jp.start=jp.jump=jp.roll=false; return;
  }
  const p=player;

  /* dying: tumble off screen */
  if(p.deadT>0){ p.deadT++; p.vy+=0.3; p.y+=p.vy;
    if(p.deadT>90){ p.lives--; if(p.lives<0){state.mode='over';} else respawn(); }
    jp.jump=jp.roll=false; return; }

  /* riding a cannon */
  if(p.inCannon>=0){
    const c=cannons[p.inCannon];
    c.t+=0.05; c.ang=c.a0+Math.sin(c.t*2)*c.swing;
    p.x=c.x; p.y=c.y;
    if(jp.jump){ const a=c.ang*Math.PI/180;
      p.vx=Math.cos(a)*7.4; p.vy=-Math.sin(a)*7.4;
      p.inCannon=-1; p.launched=true; p.inv=Math.max(p.inv,20);
      audio.sfx('launch'); state.shake=5; burst(c.x,c.y,'#ffcf3f',10); }
    jp.jump=jp.roll=false;
  }else{
    /* horizontal control */
    const accel=p.onGround?0.28:0.16, maxr=p.rolling>0?3.4:2.1;
    if(p.rolling>0){ p.vx=p.face*3.3; p.rolling--; if(p.rolling===0&&Math.abs(p.vx)>2.1)p.vx=p.face*2.1; }
    else{
      if(keys.left){p.vx-=accel; p.face=-1;}
      if(keys.right){p.vx+=accel; p.face=1;}
      if(!keys.left&&!keys.right) p.vx*=p.onGround?0.78:0.92;
      p.vx=Math.max(-maxr,Math.min(maxr,p.vx));
    }
    if(jp.roll&&p.onGround&&p.rolling<=0){p.rolling=26;audio.sfx('roll');burst(p.x-p.face*8,p.y+8,'#c9925c',4);}
    /* jump */
    if(jp.jump&&p.onGround){p.vy=-6.3;p.onGround=false;audio.sfx('jump');p.squash=6;p.rolling=0;}
    if(!keys.jump&&p.vy<-2.4&&!p.launched) p.vy=-2.4;   // variable height
    p.vy+=0.34; if(p.vy>7)p.vy=7;

    /* move + collide, axis by axis */
    p.x+=p.vx;
    const hw=p.w/2;
    if(p.vx>0){ if(solidAt(p.x+hw,p.y-p.h+4)===1||solidAt(p.x+hw,p.y-2)===1){p.x=Math.floor((p.x+hw)/TILE)*TILE-hw-0.01;p.vx=0;} }
    if(p.vx<0){ if(solidAt(p.x-hw,p.y-p.h+4)===1||solidAt(p.x-hw,p.y-2)===1){p.x=(Math.floor((p.x-hw)/TILE)+1)*TILE+hw+0.01;p.vx=0;} }
    p.y+=p.vy;
    p.onGround=false;
    if(p.vy>=0){
      const s1=solidAt(p.x-hw+2,p.y), s2=solidAt(p.x+hw-2,p.y);
      const s=(s1||s2);
      if(s===1 || (s===2 && (p.y-p.vy)<=Math.floor(p.y/TILE)*TILE+1 && !keys.down)){
        p.y=Math.floor(p.y/TILE)*TILE-0.01; p.vy=0;
        if(!p.onGround&&p.launched){state.shake=3;}
        p.onGround=true; p.launched=false;
      }
    } else {
      if(solidAt(p.x-hw+2,p.y-p.h)===1||solidAt(p.x+hw-2,p.y-p.h)===1){
        p.y=(Math.floor((p.y-p.h)/TILE)+1)*TILE+p.h; p.vy=0; }
    }
    if(p.onGround&&Math.abs(p.vx)>0.4) p.phase+=Math.abs(p.vx)*0.09;
    if(p.x<9)p.x=9; if(p.x>LEVEL_W-9)p.x=LEVEL_W-9;
    if(p.y>15*TILE+30) die();

    /* enter cannons */
    cannons.forEach((c,i)=>{ c.t+=0.05; c.ang=c.a0+Math.sin(c.t*2)*c.swing;
      if(p.inCannon<0 && Math.abs(p.x-c.x)<10 && Math.abs((p.y-p.h/2)-c.y)<12){
        p.inCannon=i; p.vx=0;p.vy=0;p.rolling=0; audio.sfx('roll'); }});
  }

  if(p.inv>0)p.inv--; if(p.squash>0)p.squash--;

  /* checkpoint */
  if(p.x>checkpointCol*TILE && p.checkpoint.x<checkpointCol*TILE){
    p.checkpoint={x:checkpointCol*TILE+8,y:11*TILE}; audio.sfx('check');
    state.msg='CHECKPOINT!'; state.msgT=90; }

  /* goal */
  if(p.x>goalCol*TILE-8 && state.mode==='play'){ state.mode='win'; winT=state.time; audio.sfx('win'); }

  /* fruit + letters */
  fruits.forEach(f=>{ if(!f.got && Math.abs(p.x-f.x)<12 && Math.abs(p.y-p.h/2-f.y)<14){
    f.got=true; p.fruit++; audio.sfx('fruit'); burst(f.x,f.y,'#ffcf3f',5);
    if(p.fruit%100===0){p.lives++; state.msg='EXTRA LIFE!'; state.msgT=90;} }});
  letters.forEach(l=>{ if(!l.got && Math.abs(p.x-l.x)<12 && Math.abs(p.y-p.h/2-l.y)<14){
    l.got=true; p.letters.push(l.ch); audio.sfx('letter'); burst(l.x,l.y,'#fff3b0',12);
    state.msg='GOT THE '+l.ch+'!'; state.msgT=80;
    if(p.letters.length===5){p.lives++; state.msg='G-R-O-V-E! EXTRA LIFE!'; state.msgT=120;} }});

  /* enemies */
  enemies.forEach(e=>{
    if(e.dead>0){e.dead++; e.y+=2; return;}
    e.ph+=0.1;
    if(e.kind==='tusker'){
      e.x+=e.dir*0.55; if(e.x<e.a){e.dir=1;} if(e.x>e.b){e.dir=-1;}
    }else{ e.y=e.y0+Math.sin(e.ph*0.7)*e.amp; e.x+=Math.sin(e.ph*0.23)*0.3; }
    if(p.deadT>0||p.inCannon>=0) return;
    const dx=Math.abs(p.x-e.x), dy=(p.y-p.h/2)-(e.y);
    if(dx<(p.w+e.w)/2-2 && Math.abs(dy)<(p.h+e.h)/2-2){
      if(p.rolling>0 || (p.vy>1&&dy<-4)){ e.dead=1; audio.sfx('stomp');
        burst(e.x,e.y,'#a9b46a',8); if(p.vy>1){p.vy=-5;} state.shake=3; }
      else hurt();
    }
  });
  enemies=enemies.filter(e=>e.dead<40);

  particles.forEach(q=>{q.x+=q.vx;q.y+=q.vy;q.vy+=0.12;q.t--;});
  particles=particles.filter(q=>q.t>0);
  if(state.msgT>0)state.msgT--;
  if(state.shake>0)state.shake--;

  /* camera */
  const target=p.x-W*0.42+p.face*20;
  cam+=(target-cam)*0.08;
  cam=Math.max(0,Math.min(LEVEL_W-W,cam));
  jp.jump=jp.roll=jp.start=false;
}

/* ---------------- drawing: world ---------------- */
function sky(){
  const gr=g.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,'#3a6b80'); gr.addColorStop(0.45,'#5b9b88');
  gr.addColorStop(0.75,'#9cc49b'); gr.addColorStop(1,'#e8d9a0');
  g.fillStyle=gr; g.fillRect(0,0,W,H);
  /* sun haze */
  const sx=W*0.72, sy=44;
  g.fillStyle='rgba(255,240,190,0.25)'; g.beginPath(); g.arc(sx,sy,30,0,7); g.fill();
  g.fillStyle='#f6e9b4'; g.beginPath(); g.arc(sx,sy,14,0,7); g.fill();
}
function ridge(par,base,amp,color,seed){
  g.fillStyle=color; g.beginPath(); g.moveTo(0,H);
  for(let x=0;x<=W;x+=4){
    const wx=x+cam*par;
    const y=base - amp*(0.6*Math.sin(wx*0.008+seed) + 0.4*Math.sin(wx*0.021+seed*2.7));
    g.lineTo(x,y);
  }
  g.lineTo(W,H); g.closePath(); g.fill();
}
function treeLayer(par,base,color,seed,scale){
  g.fillStyle=color;
  const sp=46*scale;
  const first=Math.floor((cam*par)/sp)-1;
  for(let i=first;i<first+W/sp+3;i++){
    const r=hash(i*7+seed), x=i*sp-cam*par+ (r-0.5)*18;
    const h=(40+r*46)*scale, tw=3*scale, y=base;
    P(x-tw/2,y-h,tw,h,color);                       // trunk
    for(let k=0;k<4;k++){                            // canopy blobs
      const rr=hash(i*13+k+seed);
      g.beginPath();
      g.arc(x+(rr-0.5)*26*scale, y-h+ (k-1.4)*7*scale, (11+rr*9)*scale, 0, 7);
      g.fill();
    }
  }
}
function vines(par,color){
  g.strokeStyle=color; g.lineWidth=2;
  const sp=90, first=Math.floor((cam*par)/sp)-1;
  for(let i=first;i<first+W/sp+2;i++){
    const r=hash(i*31+5), x=i*sp-cam*par+r*40, len=30+r*70;
    g.beginPath(); g.moveTo(x,0);
    for(let y=0;y<len;y+=6) g.lineTo(x+Math.sin(y*0.1+state.time*0.02+i)*3, y);
    g.stroke();
    P(x-2,len-2,5,4,color);
  }
}
function mist(base,alpha){
  g.fillStyle='rgba(232,224,190,'+alpha+')';
  for(let x=0;x<W;x+=8){
    const y=base+Math.sin(x*0.03+state.time*0.01)*4;
    g.fillRect(x,y,8,26);
  }
}
function background(){
  sky();
  ridge(0.12,150,46,'rgba(48,88,74,0.55)',3);
  ridge(0.2,162,40,'#3c6b58',11);
  mist(128,0.18);
  treeLayer(0.35,186,'#2a5244',17,0.9);
  mist(150,0.22);
  treeLayer(0.55,206,'#1b3c30',29,1.15);
  vines(0.8,'#123227');
}
function tiles(){
  const c0=Math.floor(cam/TILE), c1=c0+W/TILE+1;
  for(let c=c0;c<=c1;c++){ if(c<0||c>=LEVEL_COLS)continue;
    for(let r=0;r<15;r++){
      const t=grid[r][c]; if(!t)continue;
      const x=c*TILE-cam, y=r*TILE;
      if(t===1){
        const top=(r===0)||grid[r-1][c]!==1;
        P(x,y,16,16,'#5b3a24');
        /* dirt speckles */
        for(let k=0;k<4;k++){const rr=hash(c*97+r*31+k);
          P(x+((rr*13)|0), y+ (top?6:2)+((hash(c*5+r*77+k)*(top?9:13))|0),2,2, k%2?'#4a2e1c':'#6d4a2e');}
        if(top){
          P(x,y,16,5,'#3fa64e'); P(x,y,16,2,'#63c95f');
          const rr=hash(c*13+7);
          P(x+2+((rr*6)|0),y-3,2,3,'#3fa64e'); P(x+9+((rr*5)|0),y-2,2,2,'#63c95f');
        }
        if(c>0&&!grid[r][c-1]) P(x,y,2,16,'#3d2617');
        if(c<LEVEL_COLS-1&&!grid[r][c+1]) P(x+14,y,2,16,'#3d2617');
      }else if(t===2){
        P(x,y,16,6,'#8a5a33'); P(x,y,16,2,'#b07c47');
        P(x,y+4,16,2,'#5f3b20'); P(x+7,y+1,2,4,'#5f3b20');
      }
    }
  }
}

/* ---------------- drawing: actors ---------------- */
function drawApe(x,y,face,pose,ph){
  /* origin: feet center. pixel-art gorilla built from rects */
  g.save(); g.translate(Math.round(x),Math.round(y)); g.scale(face,1);
  const bob=(pose==='run')?Math.sin(ph*2)*1.2:(pose==='idle'?Math.sin(state.time*0.05)*0.7:0);
  if(pose==='roll'){
    const a=state.time*0.5*face;
    g.translate(0,-9); g.rotate(a*face);
    g.fillStyle='#4e321d'; g.beginPath(); g.arc(0,0,9,0,7); g.fill();
    g.fillStyle='#6b4529'; g.beginPath(); g.arc(0,0,7,0,7); g.fill();
    P(-7,-2,14,4,'#c9925c'); P(-2,-7,4,14,'#3fc1c9');
    g.restore(); return;
  }
  const airb=(pose==='jump');
  const armSwing=airb?-3:Math.sin(ph*2)*3;
  const legLift=airb?2:Math.max(0,Math.sin(ph*2+3))*2;
  g.translate(0,bob);
  /* back arm */
  P(-8,-13+armSwing*0.4,4,10,'#4e321d'); P(-9,-4+armSwing*0.4,6,4,'#4e321d');
  /* legs / haunch */
  P(-7,-8,9,8,'#5b3b22'); P(-8,-3+ (airb?-1:0),6,3,'#3d2617');
  P(1,-4-legLift,6,4+legLift,'#4e321d');
  /* body */
  P(-7,-17,14,12,'#6b4529'); P(-5,-19,11,4,'#6b4529');
  P(-4,-12,8,7,'#c9925c');                              /* belly */
  P(-7,-17,14,2,'#7d5432');                             /* back highlight */
  /* head */
  P(2,-24,9,8,'#6b4529');
  P(3,-25,7,2,'#3fc1c9'); P(3,-24,7,1,'#2c95a3');       /* headband */
  P(5,-21,6,5,'#c9925c');                               /* muzzle */
  P(6,-22,4,2,'#e0b184');
  P(4,-22,2,2,'#fff'); P(5,-22,1,2,'#1c0f08');          /* eye */
  P(9,-19,1,1,'#5f3b20'); P(7,-19,1,1,'#5f3b20');       /* nostrils */
  P(2,-22,2,3,'#5b3b22');                               /* brow edge */
  /* front arm — knuckle walk */
  P(4,-14,5,4,'#6b4529');
  P(6,-12-armSwing*0.5,4,9+armSwing*0.5,'#5b3b22');
  P(5,-4,6,4,'#4e321d');
  g.restore();
}
function drawTusker(e){
  g.save(); g.translate(Math.round(e.x-cam),Math.round(e.y)); g.scale(e.dir,1);
  if(e.dead){ g.globalAlpha=Math.max(0,1-e.dead/30); g.scale(1,-1); }
  const tr=Math.sin(e.ph*2)*1;
  P(-9,-6+tr*0.3,16,10,'#7d6b5a');           /* body */
  P(-9,-7+tr*0.3,16,3,'#93816d');
  P(3,-8,8,9,'#8a7663');                     /* head */
  P(9,-4,3,3,'#c9a184');                     /* snout */
  P(10,-6,3,2,'#efe6d2'); P(8,-1,3,2,'#efe6d2'); /* tusks */
  P(5,-6,2,2,'#1c1410');                     /* eye */
  P(-8,3,3,4+tr,'#57493c'); P(2,3,3,4-tr,'#57493c'); /* legs */
  P(-11,-5,3,3,'#57493c');                   /* tail nub */
  g.restore(); g.globalAlpha=1;
}
function drawHornet(e){
  g.save(); g.translate(Math.round(e.x-cam),Math.round(e.y));
  if(e.dead){ g.globalAlpha=Math.max(0,1-e.dead/30); g.scale(1,-1);}
  const w=Math.sin(state.time*0.9+e.ph)>0;
  g.fillStyle='rgba(220,235,240,0.8)';
  g.beginPath(); g.ellipse(-2,w?-8:-6,6,3,-0.5,0,7); g.fill();
  g.beginPath(); g.ellipse(3,w?-8:-6,6,3,0.5,0,7); g.fill();
  P(-7,-4,12,8,'#e0b23a'); P(-5,-4,2,8,'#2b2118'); P(-1,-4,2,8,'#2b2118');
  P(5,-3,5,6,'#2b2118');                       /* head */
  P(7,-2,2,2,'#f4f4f4'); P(8,-2,1,2,'#111');
  P(-9,-1,3,2,'#c9c9c9');                      /* stinger */
  g.restore(); g.globalAlpha=1;
}
function drawCannon(c){
  const x=c.x-cam, y=c.y;
  g.save(); g.translate(Math.round(x),Math.round(y));
  g.rotate(-(c.ang-90)*Math.PI/180);
  P(-8,-10,16,20,'#7a4a2b');
  P(-8,-10,16,3,'#8f5c37'); P(-8,7,16,3,'#5e3820');
  P(-8,-7,16,2,'#3d2617'); P(-8,4,16,2,'#3d2617');   /* hoops */
  P(-5,-10,10,2,'#2b1a0e');                          /* opening */
  g.restore();
  /* aim sparkle */
  const a=c.ang*Math.PI/180;
  const t=(state.time*0.1)%1;
  P(x+Math.cos(a)*(14+t*10)-1, y-Math.sin(a)*(14+t*10)-1,2,2,'rgba(255,236,150,'+(1-t)+')');
}
function drawFruit(f){
  const x=f.x-cam, y=f.y+Math.sin(state.time*0.08+f.ph)*2;
  g.fillStyle='#f4a726'; g.beginPath(); g.ellipse(x,y,5,4,0.4,0,7); g.fill();
  g.fillStyle='#ffd45e'; g.beginPath(); g.ellipse(x-1.5,y-1,2,1.4,0.4,0,7); g.fill();
  P(x+2,y-6,2,3,'#3fa64e');
}
function drawLetter(l){
  const x=l.x-cam, y=l.y+Math.sin(state.time*0.06+2)*2.5;
  g.fillStyle='rgba(255,236,150,0.25)'; g.beginPath(); g.arc(x,y,9,0,7); g.fill();
  g.fillStyle='#ffcf3f'; g.font='bold 11px ui-monospace,monospace';
  g.textAlign='center'; g.textBaseline='middle';
  g.strokeStyle='#7a4a2b'; g.lineWidth=3; g.strokeText(l.ch,x,y); g.fillText(l.ch,x,y);
}
function drawFlagpole(col,label,hot){
  const x=col*TILE-cam, y=11*TILE;
  P(x,y-38,3,38,'#7a4a2b');
  g.fillStyle=hot?'#ffcf3f':'#b5b0a0';
  g.beginPath(); g.moveTo(x+3,y-38); g.lineTo(x+20,y-32); g.lineTo(x+3,y-26); g.closePath(); g.fill();
}
function pixText(txt,x,y,size,fill,stroke){
  g.font='bold '+size+'px ui-monospace,Menlo,monospace';
  g.textAlign='center'; g.textBaseline='middle';
  if(stroke){g.strokeStyle=stroke; g.lineWidth=Math.max(2,size/4); g.strokeText(txt,x,y);}
  g.fillStyle=fill; g.fillText(txt,x,y);
}

/* ---------------- drawing: HUD & screens ---------------- */
function hud(){
  const p=player;
  /* hearts */
  for(let i=0;i<3;i++){
    const x=8+i*11, y=8, on=i<p.hearts;
    g.fillStyle=on?'#e0453a':'rgba(20,30,25,0.45)';
    P(x,y+1,3,3,g.fillStyle);P(x+4,y+1,3,3,g.fillStyle);
    P(x,y+3,7,3,g.fillStyle);P(x+1,y+6,5,2,g.fillStyle);P(x+2,y+8,3,1,g.fillStyle);
  }
  /* lives */
  drawMiniApe(12,28); pixText('x'+Math.max(0,p.lives),26,26,9,'#fff','#173225');
  /* fruit */
  g.fillStyle='#f4a726'; g.beginPath(); g.ellipse(W-46,13,5,4,0.4,0,7); g.fill();
  P(W-45,6,2,3,'#3fa64e');
  pixText(String(p.fruit).padStart(2,'0'),W-26,13,10,'#fff','#173225');
  /* letters */
  'GROVE'.split('').forEach((ch,i)=>{
    const got=p.letters.includes(ch);
    pixText(ch,W/2-24+i*12,13,10, got?'#ffcf3f':'rgba(240,240,220,0.28)', got?'#7a4a2b':'rgba(20,30,25,0.3)');
  });
  if(state.msgT>0) pixText(state.msg,W/2,40,11,'#fff3b0','#173225');
}
function drawMiniApe(x,y){
  P(x-5,y-4,10,7,'#6b4529'); P(x-1,y-8,6,5,'#6b4529');
  P(x,y-9,5,2,'#3fc1c9'); P(x+2,y-6,3,3,'#c9925c'); P(x+1,y-6,1,1,'#111');
}
function vignette(){
  const v=g.createRadialGradient(W/2,H/2,H*0.55,W/2,H/2,H*0.95);
  v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(8,16,10,0.35)');
  g.fillStyle=v; g.fillRect(0,0,W,H);
}
function titleScreen(){
  background();
  /* ground strip */
  P(0,182,W,34,'#5b3a24'); P(0,182,W,6,'#3fa64e'); P(0,182,W,2,'#63c95f');
  drawApe(70,182,1,'idle',0);
  const e={x:cam+300,y:175,dir:-1,ph:state.time*0.1,dead:0}; drawTusker(e);
  const fl=Math.sin(state.time*0.05)*3;
  pixText('GORILLA',W/2,62+fl*0.3,34,'#ffcf3f','#57320f');
  pixText('GROVE',W/2,94+fl*0.3,34,'#ffcf3f','#57320f');
  pixText('a 16-bit jungle romp',W/2,116,9,'#e8f2d8','#173225');
  if((state.time>>5)&1) pixText('PRESS ENTER / TAP TO START',W/2,150,11,'#fff','#173225');
  pixText('arrows: move   Z/space: jump   X: roll   M: mute',W/2,202,8,'rgba(240,248,230,0.85)','rgba(16,28,20,0.6)');
  vignette();
}
function endScreen(win){
  background(); tiles();
  g.fillStyle='rgba(10,22,14,0.62)'; g.fillRect(0,0,W,H);
  if(win){
    pixText('LEVEL CLEAR!',W/2,70,26,'#ffcf3f','#57320f');
    pixText('fruit: '+player.fruit+'    letters: '+player.letters.length+'/5',W/2,104,11,'#fff','#173225');
    drawApe(W/2,150,1,'idle',0);
  }else{
    pixText('GAME OVER',W/2,80,28,'#e0453a','#2b0d0a');
    pixText('the grove awaits your return...',W/2,112,10,'#e8f2d8','#173225');
  }
  if((state.time>>5)&1) pixText('PRESS ENTER / TAP TO PLAY AGAIN',W/2,178,10,'#fff','#173225');
}

/* ---------------- main draw ---------------- */
function draw(){
  g.save();
  if(state.shake>0) g.translate((Math.random()-0.5)*state.shake,(Math.random()-0.5)*state.shake*0.6);
  if(state.mode==='title'){titleScreen();g.restore();return;}
  if(state.mode==='over'){endScreen(false);g.restore();return;}
  if(state.mode==='win'){endScreen(true);g.restore();return;}

  background();
  drawFlagpole(checkpointCol,'',player.checkpoint.x>=checkpointCol*TILE);
  tiles();
  /* goal arch */
  {const x=goalCol*TILE-cam;
   P(x-20,7*TILE,4,4*TILE,'#7a4a2b'); P(x+16,7*TILE,4,4*TILE,'#7a4a2b');
   P(x-24,6*TILE,48,8,'#8f5c37');
   pixText('GOAL',x,6*TILE+4,9,'#ffcf3f','#57320f');}
  cannons.forEach(drawCannon);
  fruits.forEach(f=>{if(!f.got)drawFruit(f);});
  letters.forEach(l=>{if(!l.got)drawLetter(l);});
  enemies.forEach(e=>e.kind==='tusker'?drawTusker(e):drawHornet(e));

  /* player */
  const p=player;
  if(p.inCannon<0 && !(p.inv>0 && (state.time>>2)&1)){
    let pose='idle';
    if(p.deadT>0)pose='jump';
    else if(p.rolling>0)pose='roll';
    else if(!p.onGround)pose='jump';
    else if(Math.abs(p.vx)>0.4)pose='run';
    drawApe(p.x-cam,p.y,p.face,pose,p.phase);
  }
  particles.forEach(q=>P(q.x-cam,q.y,2,2,q.c));
  mist(H-26,0.13);
  hud();
  vignette();
  g.restore();
}

/* ---------------- loop ---------------- */
let last=0, acc=0;
function frame(t){
  requestAnimationFrame(frame);
  if(!last)last=t; let dt=t-last; last=t;
  if(dt>100)dt=100; acc+=dt;
  while(acc>=1000/60){ update(); acc-=1000/60; }
  draw();
}
resetLevel(true); state.mode='title';
requestAnimationFrame(frame);
</script>
