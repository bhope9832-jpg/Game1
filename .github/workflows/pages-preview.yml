name: Deploy comic-extender branch to GitHub Pages

# Same publish mechanism as pages.yml, but for the comic-extender feature
# branch so the app can be tested live before merging to main.
# Delete this file once the branch is merged (pages.yml takes over).

on:
  push:
    branches: [claude/comic-extension-ai-app-3b83yd]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          touch .nojekyll
          git add -A
          git commit -m "Deploy site from ${GITHUB_SHA}"
          git push -f origin gh-pages
